<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Wedding Reception - Smart Check-in</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Shippori+Mincho+B1:wght@400;500;700&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['"Shippori Mincho B1"', 'serif'],
                        serif: ['"Cormorant Garamond"', 'serif'],
                    },
                    colors: {
                        gold: { 100: '#F9F1D8', 200: '#E6C888', 300: '#D4AF37', 500: '#C5A059', 700: '#8A6D3B' },
                        charcoal: '#2C2C2C',
                        sand: '#FDFCF8',
                        success: '#4A7C59',
                        ink: '#D44D44'
                    }
                }
            }
        }
    </script>

    <style>
        /* --- Base & Scroll Control --- */
        html, body {
            height: 100%;
            width: 100%;
            overflow: hidden; /* デフォルトは固定 */
            overscroll-behavior: none; /* iPhoneのバウンス/リロードを禁止 */
            -webkit-tap-highlight-color: transparent;
        }

        /* スクロールが必要な画面用クラス */
        body.can-scroll {
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }

        /* --- Custom Animations --- */
        .spinner { width: 40px; height: 40px; border: 3px solid rgba(197, 160, 89, 0.2); border-radius: 50%; border-top-color: #C5A059; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        .circle-draw { stroke-dasharray: 1000; stroke-dashoffset: 1000; animation: draw 1.2s cubic-bezier(0.45, 0, 0.55, 1) forwards; }
        @keyframes draw { to { stroke-dashoffset: 0; } }

        .stamp-animation { animation: stamp 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        @keyframes stamp { 0% { transform: scale(3) rotate(0deg); opacity: 0; } 100% { transform: scale(1) rotate(-8deg); opacity: 0.8; } }

        .zoom-in-out { animation: zoom-card 2.5s cubic-bezier(0.23, 1, 0.32, 1) forwards; }
        @keyframes zoom-card { 0% { transform: scale(0.5); opacity: 0; } 20% { transform: scale(1.1); opacity: 1; } 80% { transform: scale(1); opacity: 1; } 100% { transform: scale(1.2); opacity: 0; } }

        .glow-animation { animation: glow-pulse 2s infinite ease-in-out; position: relative; z-index: 50; }
        @keyframes glow-pulse {
            0%, 100% { box-shadow: 0 0 10px rgba(197, 160, 89, 0.6); transform: scale(1.1); background-color: #C5A059; color: white; }
            50% { box-shadow: 0 0 30px rgba(197, 160, 89, 1); transform: scale(1.3); background-color: #D4AF37; color: white; }
        }

        .guide-text { animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 0.6; transform: translateY(0); } 50% { opacity: 1; transform: translateY(5px); } }

        .btn-gold-shimmer { position: relative; overflow: hidden; background: linear-gradient(135deg, #2C2C2C 0%, #444444 100%); }
        .btn-gold-shimmer::after { content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%; background: linear-gradient(to bottom right, transparent 40%, rgba(255,255,255,0.4) 50%, transparent 60%); transform: rotate(45deg); animation: shimmer 4s infinite; }
        @keyframes shimmer { 0% { transform: translateX(-150%) rotate(45deg); } 20%, 100% { transform: translateX(150%) rotate(45deg); } }
        
        .is-dragging { background-color: rgba(197, 160, 89, 0.1); transition: background-color 0.2s; }
        .bg-visual-main { background-image: url('https://images.unsplash.com/photo-1511795409834-ef04bbd61622?auto=format&fit=crop&w=2000&q=80'); background-size: cover; background-position: center; }
        .bg-overlay::before { content: ''; position: absolute; inset: 0; background: rgba(0, 0, 0, 0.3); z-index: 0; }
        .glass-panel { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); }
    </style>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, collection, onSnapshot, updateDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAuBDeBGX4ZEoJzUumsEX7PYAEF5N-twHM",
            authDomain: "wedding-874f2-cof.firebaseapp.com",
            projectId: "wedding-874f2-cof",
            storageBucket: "wedding-874f2-cof.firebasestorage.app",
            messagingSenderId: "865432441403",
            appId: "1:865432441403:web:b382deea2f0e4b66a6c21e"
        };
        
        let db, auth;
        let allGuests = []; 
        let currentGuest = null;
        let isProcessing = false;

        const ui = {
            loading: document.getElementById('loading-overlay'),
            modal: document.getElementById('custom-modal'),
            modalText: document.getElementById('modal-message'),
            nameInput: document.getElementById('name-input'),
            guestNameDisplay: document.querySelectorAll('.guest-name-label'),
            interactionLayer: document.getElementById('interaction-layer'),
            circleSvg: document.getElementById('circle-svg'),
            stampMark: document.getElementById('stamp-mark')
        };

        // --- Init & Data ---

        async function init() {
            const app = initializeApp(firebaseConfig);
            db = getFirestore(app);
            auth = getAuth(app);
            
            onAuthStateChanged(auth, (user) => {
                if (user) startDataListening();
                else signInAnonymously(auth);
            });
            setupInteraction();
        }

        function startDataListening() {
            onSnapshot(collection(db, `artifacts/wedding-874f2-cof/public/data/guests`), (snap) => {
                allGuests = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                ui.loading.classList.add('hidden');
            });
        }

        // --- Navigation ---

        window.switchScreen = (screenId) => {
            const screens = ['welcome-screen', 'checkin-screen', 'zoom-screen', 'seating-screen'];
            screens.forEach(id => document.getElementById(id).classList.add('hidden'));
            document.getElementById(screenId).classList.remove('hidden');

            // 画面ごとのスクロール・制御
            if (screenId === 'seating-screen' || screenId === 'welcome-screen') {
                document.body.classList.add('can-scroll');
            } else {
                document.body.classList.remove('can-scroll');
            }
            window.scrollTo(0, 0);
        };

        // --- Logic ---

        window.searchGuest = () => {
            const input = normalize(ui.nameInput.value);
            if (!input) return showModal("お名前を入力してください");

            const found = allGuests.find(g => normalize(g.kana) === input || normalize(g.name) === input);
            if (!found) return showModal("スタッフにお声がけください");

            currentGuest = found;
            ui.guestNameDisplay.forEach(el => el.textContent = `${found.name} 様`);

            if (found.checkedIn) {
                showModal("受付済です", 2000);
                setTimeout(() => showSeating(), 1500);
            } else {
                switchScreen('checkin-screen');
            }
        };

        function setupInteraction() {
            let startX, startY;
            const SWIPE_THRESHOLD = 130;
            const EDGE_GUARD = 30;

            ui.interactionLayer.addEventListener('touchstart', e => {
                const t = e.touches[0];
                if (t.clientX < EDGE_GUARD) { startX = null; return; }
                startX = t.clientX;
                startY = t.clientY;
                ui.interactionLayer.classList.add('is-dragging');
            }, { passive: true });

            ui.interactionLayer.addEventListener('touchmove', e => {
                if (e.cancelable) e.preventDefault(); // スクロール完全停止
                if (isProcessing || startX === null) return;

                const t = e.touches[0];
                const dx = t.clientX - startX;
                const dy = t.clientY - startY;
                if (Math.sqrt(dx * dx + dy * dy) > SWIPE_THRESHOLD) {
                    startX = null;
                    processCheckIn();
                }
            }, { passive: false });

            ui.interactionLayer.addEventListener('touchend', () => {
                ui.interactionLayer.classList.remove('is-dragging');
                startX = null;
            });
        }

        window.processCheckIn = async () => {
            if (isProcessing || !currentGuest) return;
            isProcessing = true;
            ui.circleSvg.classList.remove('hidden');

            try {
                const guestRef = doc(db, `artifacts/wedding-874f2-cof/public/data/guests`, currentGuest.id);
                await updateDoc(guestRef, { checkedIn: true, checkInTime: serverTimestamp() });
                
                setTimeout(() => {
                    ui.stampMark.classList.remove('hidden');
                    ui.stampMark.classList.add('stamp-animation');
                    setTimeout(() => showZoomEffect(), 1500);
                }, 1000);
            } catch (e) {
                showModal("通信エラーが発生しました");
                reset();
            }
        };

        function showZoomEffect() {
            switchScreen('zoom-screen');
            const displayTable = currentGuest.tableID?.includes('-') ? currentGuest.tableID.split('-')[1] : (currentGuest.tableID || currentGuest.table?.charAt(0));
            document.getElementById('zoom-table-no').textContent = displayTable;
            
            setTimeout(() => {
                showSeating();
                isProcessing = false;
            }, 2500);
        }

        function showSeating() {
            switchScreen('seating-screen');
            document.getElementById('table-no').textContent = currentGuest.table || "";
            
            document.querySelectorAll('.table-item').forEach(el => el.classList.remove('glow-animation'));

            const elementId = currentGuest.tableID?.startsWith('table-') ? currentGuest.tableID : `table-${currentGuest.tableID}`;
            const target = document.getElementById(elementId);
            if (target) {
                target.classList.add('glow-animation');
                setTimeout(() => target.scrollIntoView({ behavior: 'smooth', block: 'center' }), 500);
            }
        }

        window.reset = () => {
            switchScreen('welcome-screen');
            ui.nameInput.value = "";
            ui.circleSvg.classList.add('hidden');
            ui.stampMark.classList.remove('stamp-animation');
            ui.stampMark.classList.add('hidden');
            currentGuest = null;
            isProcessing = false;
        };

        // --- Utils ---
        function normalize(str) {
            return String(str || "").normalize("NFKC").replace(/[\u30A1-\u30F6]/g, m => String.fromCharCode(m.charCodeAt(0) - 0x60)).replace(/[\s　]/g, '').toLowerCase();
        }
        window.showModal = (msg, duration = 0) => {
            ui.modalText.textContent = msg;
            ui.modal.classList.remove('hidden');
            ui.modal.classList.add('flex');
            if (duration > 0) setTimeout(() => ui.modal.classList.add('hidden'), duration);
        };

        window.onload = init;
    </script>
</head>
<body class="bg-sand text-charcoal font-sans select-none">

    <!-- Loading -->
    <div id="loading-overlay" class="fixed inset-0 z-[100] bg-sand/90 flex flex-col items-center justify-center">
        <div class="spinner mb-4"></div>
        <p class="text-gold-700 text-[10px] tracking-[0.4em]">Loading</p>
    </div>

    <!-- Alert Modal -->
    <div id="custom-modal" class="hidden fixed inset-0 z-[110] items-center justify-center p-6 bg-black/60">
        <div class="w-full max-w-sm glass-panel p-8 rounded-3xl text-center shadow-2xl">
            <p id="modal-message" class="text-base mb-6"></p>
            <button onclick="document.getElementById('custom-modal').classList.add('hidden')" class="w-full py-4 bg-charcoal text-white rounded-full text-xs">閉じる</button>
        </div>
    </div>

    <!-- 1. Welcome Screen -->
    <div id="welcome-screen" class="min-h-screen flex flex-col">
        <div class="h-[40vh] bg-visual-main bg-overlay relative flex flex-col items-center justify-center text-center text-white">
            <div class="z-10 px-6">
                <p class="font-serif text-gold-300 text-xs tracking-[0.4em] mb-2 uppercase">Color of Stories</p>
                <h1 class="font-serif text-6xl mb-4 italic">Wedding Party</h1>
                <p class="text-xs tracking-widest opacity-80 font-sans">Kohei & Haruka</p>
            </div>
        </div>
        <div class="flex-grow p-8 flex flex-col items-center">
            <div class="w-full max-w-sm space-y-10 mt-12 text-center">
                <div class="space-y-2">
                    <h2 class="text-3xl font-serif tracking-[0.2em] font-bold">Welcome</h2>
                    <p class="text-xs text-gray-400">お名前を「ひらがな」で入力してください</p>
                </div>
                <input type="text" id="name-input" class="w-full py-4 text-3xl text-center bg-transparent border-b-2 border-gray-200 focus:border-gold-500 outline-none" placeholder="まいはま　みきお">
                <button onclick="searchGuest()" class="btn-gold-shimmer w-full py-5 text-white rounded-full tracking-[0.5em] font-serif shadow-2xl uppercase text-sm font-bold">Search</button>
            </div>
        </div>
    </div>

    <!-- 2. Check-in Screen (Locked) -->
    <div id="checkin-screen" class="hidden h-[100dvh] w-full fixed inset-0 bg-sand flex flex-col items-center justify-center p-4">
        <div class="w-full max-w-sm glass-panel rounded-[2.5rem] p-6 shadow-2xl text-center relative overflow-hidden flex flex-col items-center min-h-[500px]">
            <p class="font-serif text-gold-500 text-xs tracking-[0.4em] mb-12">Seating guidance</p>
            <div id="interaction-layer" 
                 class="relative w-full py-20 flex flex-col items-center justify-center mb-8 bg-white/50 rounded-3xl overflow-hidden cursor-pointer"
                 style="touch-action: none;">
                <div class="guide-text mb-4 z-20">
                    <span class="text-ink font-bold text-[10px] bg-white/80 px-4 py-1.5 rounded-full shadow-sm border border-ink/10">受付までお越しください</span>
                </div>
                <h3 class="guest-name-label text-4xl font-bold z-20 mb-2"></h3>
                <svg id="circle-svg" class="absolute inset-0 z-10 w-full h-full p-4 hidden" viewBox="0 0 200 200">
                    <circle cx="100" cy="100" r="80" fill="none" stroke="#D44D44" stroke-width="4" class="circle-draw" />
                </svg>
                <div id="stamp-mark" class="hidden absolute inset-0 flex items-center justify-center z-30 pointer-events-none">
                    <div class="border-4 border-ink text-ink text-3xl font-black p-4 rounded-xl uppercase -rotate-12 bg-white/90 shadow-xl">Check-in OK</div>
                </div>
            </div>
            <p class="text-[10px] text-gray-400">受付スタッフへこの画面をお見せください</p>
        </div>
        <button onclick="reset()" class="mt-8 text-[10px] text-gray-400 underline">Top Screen</button>
    </div>

    <!-- 2.5 Zoom Screen (Locked) -->
    <div id="zoom-screen" class="hidden fixed inset-0 z-[80] bg-charcoal h-[100dvh] w-full flex flex-col items-center justify-center p-6">
        <div class="zoom-in-out w-full max-w-sm aspect-square bg-white rounded-[3rem] shadow-2xl flex flex-col items-center justify-center text-center p-12 border-[12px] border-gold-300">
            <p class="font-serif text-gold-500 text-sm tracking-[0.5em] mb-8 uppercase">Your Table</p>
            <h4 id="zoom-table-no" class="text-9xl font-serif font-bold text-charcoal"></h4>
        </div>
    </div>

    <!-- 3. Seating Screen (Scrollable) -->
    <div id="seating-screen" class="hidden min-h-screen p-6 flex flex-col items-center bg-sand">
        <div class="w-full max-w-sm glass-panel rounded-[2.5rem] p-10 shadow-2xl text-center mb-10 border-t-[10px] border-success">
            <h3 class="guest-name-label text-3xl font-bold mb-6"></h3>
            <div class="py-8 border-y border-gold-100 mb-6 flex flex-col items-center justify-center min-h-[140px]">
                <p class="text-[10px] text-gray-400 tracking-[0.4em] mb-2 uppercase">Your Table</p>
                <p id="table-no" class="text-4xl font-serif font-bold text-gold-700"></p>
            </div>
            <p class="text-xs text-gray-400 leading-relaxed">ご列席ありがとうございます<br>素敵なひとときをお過ごしください</p>
        </div>

        <div class="w-full max-w-md bg-white/70 p-10 rounded-[3rem] shadow-sm mb-12 border border-white">
            <div class="flex justify-center mb-12">
                <div class="w-40 py-2 border-b-2 border-gold-200 text-center">
                    <span class="text-[10px] text-gray-400 tracking-[0.4em] uppercase">Main Table</span>
                </div>
            </div>

            <div class="space-y-16">
                <div class="grid grid-cols-3 gap-4 justify-items-center font-serif text-xl">
                    <div id="table-A" class="table-item w-16 h-16 rounded-full bg-white border border-gray-100 flex items-center justify-center shadow-md transition-all duration-700">A</div>
                    <div id="table-B" class="table-item w-16 h-16 rounded-full bg-white border border-gray-100 flex items-center justify-center shadow-md transition-all duration-700">B</div>
                    <div id="table-C" class="table-item w-16 h-16 rounded-full bg-white border border-gray-100 flex items-center justify-center shadow-md transition-all duration-700">C</div>
                </div>
                <div class="grid grid-cols-3 gap-4 justify-items-center font-serif text-xl">
                    <div id="table-D" class="table-item w-16 h-16 rounded-full bg-white border border-gray-100 flex items-center justify-center shadow-md transition-all duration-700">D</div>
                    <div id="table-E" class="table-item w-16 h-16 rounded-full bg-white border border-gray-100 flex items-center justify-center shadow-md transition-all duration-700">E</div>
                    <div id="table-F" class="table-item w-16 h-16 rounded-full bg-white border border-gray-100 flex items-center justify-center shadow-md transition-all duration-700">F</div>
                </div>
                <div class="flex justify-center space-x-12 font-serif text-xl">
                    <div id="table-G" class="table-item w-16 h-16 rounded-full bg-white border border-gray-100 flex items-center justify-center shadow-md transition-all duration-700">G</div>
                    <div id="table-H" class="table-item w-16 h-16 rounded-full bg-white border border-gray-100 flex items-center justify-center shadow-md transition-all duration-700">H</div>
                </div>
            </div>
        </div>

        <button onclick="reset()" class="mb-16 text-[10px] text-gray-400 tracking-[0.3em] border border-gray-300 px-10 py-3 rounded-full hover:bg-white transition-colors">Top Screen</button>
    </div>

</body>
</html>
